# Kubernetes Deployment for auth microservice
# Replace placeholders before apply:
#   <ARTIFACT_REGISTRY_URL>  e.g. gcr.io/my-project or us-docker.pkg.dev/my-project/docker
#   <VERSION>                use commit SHA (e.g. $(git rev-parse --short HEAD)) or semantic version
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  labels:
    app: auth
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: auth
        version: "1.0"
    spec:
      containers:
        - name: auth
          image: <ARTIFACT_REGISTRY_URL>/auth:<VERSION>
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          envFrom:
            - configMapRef:
                name: auth-config
            - secretRef:
                name: auth-secrets
                optional: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-config
  labels:
    app: auth
data:
  DB_URL: "jdbc:postgresql://127.0.0.1:5432/auth"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  AUTH_ISSUER_URI: "https://auth.example.com"
  AUTH_VERIFICATION_BASE_URL: "https://auth.example.com"
  OAUTH2_REDIRECT_URI: "https://app.example.com/login/oauth2/code/client-app"
  GCP_PROJECT_ID: "my-project"
  SERVER_PORT: "8081"
---
# Secrets: create with kubectl or use External Secrets Operator
# kubectl create secret generic auth-secrets \
#   --from-literal=JWT_SECRET=... \
#   --from-literal=DB_PASSWORD=... \
#   --from-literal=REDIS_PASSWORD=... \
#   --from-literal=SPRING_MAIL_USERNAME=... \
#   --from-literal=SPRING_MAIL_PASSWORD=... \
#   --from-literal=OAUTH2_CLIENT_SECRET=...
