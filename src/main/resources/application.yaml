auth:
  issuer-uri: ${AUTH_ISSUER_URI:https://auth.mycompany.com}
  pubsub:
    user-signup-topic: ${USER_SIGNUP_TOPIC:user-signup-events}

security:
  jwt:
    issuer: ecommerce-auth
    access-token-ttl-seconds: 900     # 15 minutes
    refresh-token-ttl-seconds: 2592000 # 30 days
    secret: ${JWT_SECRET:default-secret-key}

spring:
  application:
    name: auth

  cloud:
    gcp:
      project-id: ${GCP_PROJECT_ID:my-project-chat-ai-487408}
      credentials:
        location: ${GCP_CREDENTIALS_PATH:file:/home/shivam-sharma/.gcp/my-project-chat-ai-487408-5604b2cd4107.json}
      pubsub:
        enabled: ${GCP_PUBSUB_ENABLED:true}

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  datasource:
    url: jdbc:postgresql://localhost:5432/auth
    username: ${DB_USERNAME:auth_user}
    password: ${DB_PASSWORD:auth_password}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: none

  data:
    redis:
      host: localhost
      port: 6379
      password: myStrongRedisPassword
      timeout: 2s
