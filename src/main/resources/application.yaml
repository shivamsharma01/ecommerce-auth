security:
  jwt:
    issuer: ecommerce-auth
    access-token-ttl-seconds: 900     # 15 minutes
    refresh-token-ttl-seconds: 2592000 # 30 days
    secret: ${JWT_SECRET:default-secret-key}

spring:
  cloud:
    gcp:
      project-id: ${GCP_PROJECT_ID:dev-project}
      credentials:
        location: ${GCP_CREDENTIALS_PATH:}
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  datasource:
    url: jdbc:postgresql://localhost:5432/auth
    username: ${DB_USERNAME:auth_user}
    password: ${DB_PASSWORD:auth_password}
    hikari:
      maximum-pool-size: 10
    hibernate:
      ddl-auto: none

  data:
    redis:
      host: localhost
      port: 6379
      password: myStrongRedisPassword
      timeout: 2s