spring:
  application:
    name: auth
  profiles:
    group:
      dev:
        - local
  cloud:
    gcp:
      project-id: ${GCP_PROJECT_ID:}
      credentials:
        location: ${GCP_CREDENTIALS_PATH:}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/auth}
    username: ${DB_USERNAME:auth_user}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: none
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

auth:
  issuer-uri: ${AUTH_ISSUER_URI:http://localhost:8081}
  cookie:
    secure: ${AUTH_COOKIE_SECURE:true}
  pubsub:
    user-signup-topic: ${AUTH_PUBSUB_USER_SIGNUP_TOPIC:user-signup-events}
    email-verification-topic: ${AUTH_PUBSUB_EMAIL_VERIFICATION_TOPIC:email-verification-events}
  verification:
    base-url: ${AUTH_VERIFICATION_BASE_URL:}
    # Optional full URL after successful /auth/verify-email (default: base-url + /signup)
    post-verify-redirect-url: ${AUTH_POST_VERIFY_REDIRECT_URL:}
    rate-limit-max: ${EMAIL_VERIFICATION_RATE_LIMIT:3}
    # POST /auth/resend-verification (separate Redis key from signup send)
    resend-rate-limit-max: ${EMAIL_VERIFICATION_RESEND_RATE_LIMIT:10}
    token-ttl-hours: ${EMAIL_VERIFICATION_TTL_HOURS:24}
  login-attempt:
    max-attempts: ${LOGIN_MAX_ATTEMPTS:5}
    lock-duration-minutes: ${LOGIN_LOCK_DURATION_MINUTES:15}
  oauth2:
    client-id: ${OAUTH2_CLIENT_ID:client-app}
    client-secret: ${OAUTH2_CLIENT_SECRET:}
    redirect-uri: ${OAUTH2_REDIRECT_URI:}

security:
  jwt:
    issuer: ecommerce-auth
    access-token-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:900}
    refresh-token-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:2592000}
    secret: ${JWT_SECRET:}
