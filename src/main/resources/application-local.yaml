# Local development defaults - auth service runs at localhost:8081
auth:
  issuer-uri: http://localhost:8081
  cookie:
    secure: false
  # After /auth/verify-email, redirect the browser to the Angular dev server (not /signup on :8081).
  verification:
    post-verify-redirect-url: http://localhost:4200/signup
  oauth2:
    client-secret: ${OAUTH2_CLIENT_SECRET:local-dev-secret}
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:8081/login/oauth2/code/client-app}

security:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-in-production}

spring:
  cloud:
    gcp:
      project-id: "${MCART_GCP_PROJECT_ID:${GOOGLE_CLOUD_PROJECT:my-project-chat-ai-487408}}"
      pubsub:
        project-id: "${MCART_GCP_PROJECT_ID:${GOOGLE_CLOUD_PROJECT:my-project-chat-ai-487408}}"
  datasource:
    url: jdbc:postgresql://localhost:5433/auth
    username: ${DB_USERNAME:auth_user}
    password: ${DB_PASSWORD:auth_password}
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:myStrongRedisPassword}
