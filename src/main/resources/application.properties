spring.application.name=auth
server.port=8081

# Base URL for verification links (e.g. http://localhost:8081)
auth.verification.base-url=${AUTH_VERIFICATION_BASE_URL:http://localhost:8081}

# Email (Gmail SMTP) - use App Password (see GMAIL_APP_PASSWORD_SETUP.md)
# Set SPRING_MAIL_USERNAME and SPRING_MAIL_PASSWORD before starting
spring.mail.test-connection=false
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# Set via env vars: SPRING_MAIL_USERNAME, SPRING_MAIL_PASSWORD (use Gmail App Password)
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.debug=false